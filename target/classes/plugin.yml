name: Aegis
version: '1.0.0'
main: club.aurovion.aegis.Aegis
api-version: '1.20'
author: Aurovion
description: Lightweight server-side anti-cheat - movement and combat checks.
website: https://aurovion.club
commands:
  aegis:
    description: Manage Aegis.
    usage: /aegis <alerts|vl|reload|checks>
    permission: aegis.command
permissions:
  aegis.command:
    description: Access to Aegis commands.
    default: op
  aegis.alerts:
    description: Receive Aegis violation alerts.
    default: op
  aegis.bypass:
    description: Be exempt from all Aegis checks.
    default: false
